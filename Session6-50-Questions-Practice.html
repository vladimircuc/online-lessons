<style>

.cluster-title{font-size:16px;font-weight:800;color:var(--purple)}.cluster-desc{font-size:12px;color:var(--dim);margin-top:2px}

.qtype{background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.2);border-radius:8px;padding:2px 8px;font-size:10px;font-weight:700;color:var(--purple);flex-shrink:0}

.open-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'Fira Code',monospace;font-size:13px;resize:vertical;min-height:40px;margin-bottom:8px}.open-input:focus{outline:none;border-color:rgba(59,130,246,0.4)}
.reveal-btn{background:rgba(168,85,247,0.15);border:1px solid rgba(168,85,247,0.3);color:rgba(192,132,252,0.9);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif}

.opt.sel{background:rgba(59,130,246,0.12);border-color:rgba(59,130,246,0.4);color:var(--accent)}

.chk.rdy{background:rgba(59,130,246,0.18);border-color:rgba(59,130,246,0.35);color:var(--accent);cursor:pointer}

.progress{position:fixed;top:0;left:0;height:3px;background:var(--accent);z-index:999;transition:width 0.2s}
.score-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,14,0.95);border-top:1px solid var(--border);padding:10px 20px;display:flex;justify-content:center;gap:20px;font-size:13px;font-weight:600;backdrop-filter:blur(10px);z-index:99}

<body>
<div class="progress" id="prog"></div>
<div class="tag">Session 6 / In-Class Practice</div>
<h1>50 Questions: Data Analysis & Visualization</h1>
<p class="sub">Open-ended first per cluster, then MCQ. Heavy on correlation vs causation.</p>
<div id="content"></div>
<div class="score-bar"><span class="sc-c" id="sc-c">Correct: 0</span><span class="sc-w" id="sc-w">Wrong: 0</span><span class="sc-t" id="sc-t">Answered: 0 / 50</span></div>
<div style="height:60px"></div>
<script>
let correct=0,wrong=0,answered=0;
const DATA=[
{cluster:"Extracting Information from Data",desc:"What can you compute vs what requires assumptions?"},
{type:"open",q:"A dataset has: student ID, hours studied,\nand exam score for 500 students.\n\nList 3 pieces of information you\nCAN determine from this data,\nand 1 you CANNOT.",a:"CAN determine:\n1. Average exam score (compute mean)\n2. Student who studied the most hours\n3. Whether there's a correlation between\n   hours studied and exam scores\n\nCANNOT determine:\n- Whether studying MORE CAUSED higher scores\n  (correlation ≠ causation, confounding variables\n  like natural ability or sleep quality)"},
{type:"open",q:"A hospital has patient records:\nage, diagnosis, treatment, and outcome.\n\nWhy might this data be incomplete\nor misleading?",a:"Possible issues:\n- Only includes patients who WENT to this hospital\n  (selection bias, misses people who went elsewhere)\n- Patients who died before reaching hospital\n  are not in the data\n- Diagnoses could be coded inconsistently\n- Missing data for patients who left early\n- Only one hospital, not generalizable\n- Doesn't include lifestyle factors (diet, exercise)\n  that affect outcomes"},
{type:"mcq",q:"A store tracks daily sales of 100 items.\nWhich CAN be determined from this data?",o:["A. Why customers prefer certain products","B. The best-selling item each day","C. What customers will buy next month","D. Whether advertising caused increased sales"],a:1,e:"B is a simple max operation on the data. A requires knowing motivation (why). C requires prediction. D requires causation analysis."},
{type:"mcq",q:"More data generally leads to:",o:["A. Guaranteed correct conclusions","B. More reliable patterns and trends","C. Elimination of all bias","D. Simpler analysis"],a:1,e:"More data = more reliable patterns. But it doesn't guarantee correctness (bad data is still bad), doesn't eliminate bias (biased collection stays biased), and makes analysis more complex, not simpler."},
{type:"mcq",q:"Which CANNOT be determined from\na dataset of city populations over\n50 years?",o:["A. The year with highest population","B. The average growth rate per decade","C. Why people moved to the city","D. Which decade had the most growth"],a:2,e:"Why people moved requires surveys, interviews, or economic analysis, not just population numbers. A, B, D are all computable from the data."},
{type:"mcq",q:"Processing data into information means:",o:["A. Deleting the original data","B. Converting data to binary","C. Analyzing, organizing, or interpreting raw values to give them meaning","D. Compressing the data to save space"],a:2,e:"Information is data that has been processed to be meaningful. Raw numbers become useful when analyzed."},

{cluster:"Data Cleaning & Combining",desc:"What needs to happen before analysis?"},
{type:"open",q:"Dataset A has student emails and GPAs.\nDataset B has student emails and\ninstagram followers.\n\nWhat could you learn by combining them?\nWhat are the risks?",a:"Could learn:\n- Whether there's a correlation between\n  social media activity and GPA\n- Whether high-GPA students have more or\n  fewer followers on average\n\nRisks:\n- Privacy: students didn't consent to having\n  their academic and social data combined\n- Re-identification: email links to real identity\n- Misuse: could be used to judge students\n  unfairly based on social media presence\n- The correlation (if any) could be misinterpreted\n  as causation"},
{type:"mcq",q:"A dataset has \"New York\", \"NY\",\n\"new york\", and \"N.Y.\" for the\nsame city. Before analysis, you must:",o:["A. Delete all New York entries","B. Standardize to one consistent format","C. Leave as-is for accuracy","D. Convert to numeric codes only"],a:1,e:"Inconsistent formatting means the same city would be counted as 4 different cities. Standardize first."},
{type:"mcq",q:"Combining two anonymous datasets\ncan be risky because:",o:["A. The combined file is too large","B. Individuals may be re-identified from combined fields","C. Anonymous data can never be combined","D. It creates duplicate entries"],a:1,e:"Multiple fields (zip, age, gender) together can uniquely identify someone even if no names are present."},
{type:"mcq",q:"Which is a necessary step before\nanalyzing survey data?",o:["A. Publish the results immediately","B. Remove all entries that disagree with your hypothesis","C. Check for and handle missing values, duplicates, and errors","D. Convert all text to numbers"],a:2,e:"Data cleaning (missing values, duplicates, errors) must happen BEFORE analysis. B is scientific fraud. A skips quality control. D isn't always necessary."},
{type:"mcq",q:"A researcher combines health data\nand social media data. Even though\nboth are \"anonymized\", the combination\nreveals that User #4527 is a specific\nperson with diabetes. This is called:",o:["A. Data compression","B. Re-identification","C. Metadata extraction","D. Lossy processing"],a:1,e:"Re-identification: using combined data points to identify a specific individual despite anonymization."},

{cluster:"Correlation vs Causation",desc:"THE most tested concept in BI2. Drill this hard."},
{type:"open",q:"Countries that consume more chocolate\nper capita have more Nobel Prize\nwinners per capita.\n\nDoes chocolate consumption cause\nNobel Prizes? Explain fully.",a:"No. This is correlation, not causation.\n\nConfounding variables:\n- Wealthy countries can afford more chocolate\n  AND fund more research/universities\n- Countries with strong education systems\n  produce both chocolate consumers and\n  Nobel winners\n- GDP per capita likely drives both\n\nThis is a famous real study used to\nillustrate the correlation/causation\nfallacy. The data is real but the\ncausal claim is absurd."},
{type:"open",q:"A study finds that children who\nplay video games for 2+ hours daily\nhave lower grades.\n\nA parent says: \"Video games destroy\ngrades! We're banning them.\"\n\nWhat is the logical flaw?",a:"The parent assumes causation from correlation.\n\nAlternative explanations:\n- Kids struggling in school may turn to\n  games as an escape (reverse causation)\n- Kids with less parental supervision may\n  both play more games AND do less homework\n  (confounding variable: parental involvement)\n- Kids with attention difficulties may both\n  prefer games and struggle academically\n\nThe data shows an association. It does NOT\nprove that games caused the lower grades."},
{type:"open",q:"Give an example of:\n1. Positive correlation\n2. Negative correlation\n3. A correlation that is NOT causation",a:"1. Positive: Height and weight.\n   Taller people tend to weigh more.\n\n2. Negative: Price of a product and\n   quantity sold. Higher price → fewer sales.\n\n3. Not causation: Number of firefighters\n   at a fire and amount of damage.\n   More firefighters correlate with more damage,\n   but firefighters don't CAUSE damage.\n   Confounding variable: bigger fires need\n   more firefighters AND cause more damage."},
{type:"mcq",q:"Data shows students who sit in the\nfront row get higher grades. Which\nconclusion is VALID?",o:["A. Sitting in front causes better grades","B. Teachers grade front-row students easier","C. There is an association between seat choice and grades","D. All students should move to the front"],a:2,e:"C is the only valid conclusion. Motivated students may CHOOSE front seats (self-selection), not that the seat location causes better performance."},
{type:"mcq",q:"A city adds bike lanes. Bike accidents\nincrease. A council member says bike\nlanes are dangerous. What's the flaw?",o:["A. Bike lanes are actually safe","B. More bikers due to lanes means more accidents overall, but the RATE per biker may be lower","C. The data is wrong","D. Accidents can't be measured"],a:1,e:"More bike lanes → more people biking → more total accidents even if each individual biker is safer. The rate per cyclist is what matters, not the total count."},
{type:"mcq",q:"Which statement correctly describes\na correlation?",o:["A. X directly causes changes in Y","B. Changes in X tend to occur alongside changes in Y","C. X and Y are completely independent","D. X prevents changes in Y"],a:1,e:"Correlation means X and Y tend to move together. A claims causation. C means no correlation. D implies a specific causal mechanism."},
{type:"mcq",q:"A confounding variable is:",o:["A. A variable you forgot to measure that influences both variables being studied","B. A variable that has no effect","C. The same as the independent variable","D. Only found in experiments, not observational data"],a:0,e:"A confounding (lurking) variable influences both the variables you're looking at, creating a false appearance of a direct relationship between them."},
{type:"mcq",q:"To PROVE causation (not just correlation),\nyou need:",o:["A. A very large dataset","B. A controlled experiment with random assignment","C. A survey with many questions","D. Data from multiple countries"],a:1,e:"Only controlled experiments with random assignment and control groups can establish causation. Observational data (no matter how large) only shows correlation."},
{type:"mcq",q:"\"People who own boats are more likely\nto have swimming pools.\"\n\nThe most likely confounding variable is:",o:["A. Water quality","B. Geographic location","C. Income/wealth","D. Swimming ability"],a:2,e:"Wealthy people can afford both boats AND pools. Income drives both, creating the correlation."},
{type:"mcq",q:"A negative correlation between X and Y\nmeans:",o:["A. X and Y are unrelated","B. As X increases, Y tends to decrease","C. X causes Y to decrease","D. Both X and Y decrease together"],a:1,e:"Negative correlation: one goes up, other goes down. B describes this. C adds causation (wrong). D describes both decreasing (that would be positive correlation if they move in the same direction)."},
{type:"mcq",q:"A study finds a strong positive\ncorrelation (r = 0.92) between\nice cream sales and shark attacks.\nWhat should you conclude?",o:["A. Ice cream attracts sharks","B. Sharks cause people to buy ice cream","C. A third variable (summer/hot weather) likely drives both","D. The correlation must be an error"],a:2,e:"Classic example. Hot weather drives both more ice cream purchases AND more people swimming (more shark encounters). The confounding variable is temperature/season."},

{cluster:"Data Visualization & Misleading Graphs",desc:"How graphs inform, and how they deceive."},
{type:"open",q:"A company shows a bar chart where\ntheir product's satisfaction rating\nis 4.2/5.0 and the competitor is 4.0/5.0.\nThe y-axis goes from 3.9 to 4.3.\n\nWhat impression does this give?\nWhat would be more honest?",a:"Impression: Their product looks VASTLY superior\nbecause the bar is over twice as tall.\n\nReality: The difference is only 0.2 points\nout of 5.0, which is a 4% difference.\n\nMore honest: Start the y-axis at 0 (or at\nleast 0-5) so the bars look nearly identical,\nwhich accurately reflects how close they are.\n\nThe truncated y-axis exaggerates a tiny\ndifference into a dramatic visual gap."},
{type:"open",q:"When would you use each chart type?\n\n1. Bar chart\n2. Line graph\n3. Pie chart\n4. Scatter plot",a:"1. Bar chart: Compare CATEGORIES\n   (sales by product, population by country)\n\n2. Line graph: Show CHANGE OVER TIME\n   (stock price, temperature, population trend)\n\n3. Pie chart: Show PARTS OF A WHOLE\n   (budget breakdown, market share percentages)\n   Slices should add to 100%.\n\n4. Scatter plot: Show RELATIONSHIP between\n   two numeric variables\n   (height vs weight, study hours vs grade)"},
{type:"mcq",q:"A graph shows unemployment dropping\nfrom 5.1% to 4.9%. The y-axis ranges\nfrom 4.8% to 5.2%. This is misleading\nbecause:",o:["A. Unemployment didn't actually drop","B. The narrow y-axis range makes a 0.2% change look dramatic","C. Percentages can't be graphed","D. The x-axis is missing"],a:1,e:"0.2% is a small change. But with y-axis from 4.8-5.2%, that tiny change fills most of the chart height, making it look like a major shift."},
{type:"mcq",q:"A pie chart shows 5 categories that\nadd up to 120%. This graph is:",o:["A. Fine, pie charts can exceed 100%","B. Invalid, pie chart slices must total 100%","C. Only wrong if it's less than 100%","D. Correct if the categories overlap"],a:1,e:"Pie charts represent parts of a whole. The whole is 100%. If slices exceed 100%, the chart is either using wrong data or allowing multiple selections (which shouldn't use pie charts)."},
{type:"mcq",q:"Which visualization best shows the\nrelationship between hours of sleep\nand test scores for 200 students?",o:["A. Pie chart","B. Line graph","C. Bar chart","D. Scatter plot"],a:3,e:"Scatter plot shows the relationship between two numeric variables. Each dot is one student. You can see the pattern (positive, negative, or no correlation)."},
{type:"mcq",q:"A news article shows a graph of\ncrime rates from 2020-2022, which\nwere unusually high. Crime in 2023\nand 2024 returned to normal levels.\nBy only showing 2020-2022, the graph:",o:["A. Is perfectly accurate","B. Cherry-picks a time range to create a misleading narrative","C. Shows the complete picture","D. Uses too much data"],a:1,e:"Showing only the unusual period without context creates a false impression that crime is out of control, when the broader trend shows a temporary spike."},
{type:"mcq",q:"A graph comparing two school districts\nshows District A's bar twice as tall\nas District B's. But District A has\n92% graduation rate and District B has\n88%. The y-axis starts at 84%.\nThe graph is misleading because:",o:["A. District A is actually worse","B. The truncated y-axis makes a 4% difference look like a 100% difference","C. Bar charts can't show percentages","D. 92% and 88% are the same thing"],a:1,e:"Starting at 84% instead of 0% makes the visual difference enormous when the actual difference is only 4 percentage points."},
{type:"mcq",q:"Which is the BEST graph for showing\nhow a country's population changed\nfrom 1950 to 2025?",o:["A. Scatter plot","B. Pie chart","C. Line graph","D. Histogram"],a:2,e:"Line graph is best for showing change over time (trends). Population over 75 years is a classic time-series trend."},

{cluster:"Reading Passage Practice",desc:"5 of 70 MCQ come with a passage. Practice the format."},
{type:"open",q:"PASSAGE: A social media platform uses\nan algorithm to recommend posts to users\nbased on their past behavior, including\nlikes, shares, time spent viewing, and\nsearch history. The platform collects\nthis data continuously.\n\nIdentify 2 benefits and 2 concerns\nof this system.",a:"Benefits:\n1. Users see content they're interested in,\n   improving their experience\n2. Content creators reach audiences who\n   actually want to see their posts\n\nConcerns:\n1. Filter bubble/echo chamber: users only see\n   content that confirms their existing views,\n   limiting exposure to diverse perspectives\n2. Privacy: continuous tracking of all behavior\n   is invasive, PII is collected without users\n   fully understanding the extent\n\nOther valid concerns:\n- Algorithmic bias (some content favored)\n- Addictive design (maximizing engagement)\n- Data could be breached or sold"},
{type:"mcq",q:"PASSAGE: A city installs sensors on\ntrash cans that report fill levels.\nThe data is used to optimize collection\nroutes, sending trucks only to full cans.\n\nWhich is a direct benefit?",o:["A. Fewer trash trucks are needed overall","B. Collection routes are more efficient, reducing fuel use","C. Citizens produce less trash","D. The sensors eliminate all waste"],a:1,e:"The system optimizes routes (direct benefit from the data). A is possible but not guaranteed. C is unrelated to the sensors. D is absurd."},
{type:"mcq",q:"PASSAGE (continued): The city publishes\na report showing that neighborhoods with\nmore sensors have cleaner streets.\n\nA valid concern about this conclusion is:",o:["A. Sensors always improve cleanliness","B. Wealthier neighborhoods may have received sensors first AND have cleaner streets for other reasons","C. The report is definitely wrong","D. Street cleanliness can't be measured"],a:1,e:"Confounding variable: if wealthier neighborhoods got sensors first, they may already have been cleaner (more funding for maintenance, different resident behavior). The sensors alone may not explain the difference."},
{type:"mcq",q:"PASSAGE: An online retailer tracks\nuser browsing history, purchases,\nand location to personalize ads.\nUsers who clicked personalized ads\npurchased 40% more than those who\ndidn't click.\n\nWhich conclusion is supported?",o:["A. Personalized ads cause people to buy 40% more","B. There is an association between clicking personalized ads and higher purchases","C. All online ads should be personalized","D. Users who don't click ads never buy anything"],a:1,e:"B states association (correlation). A claims causation (people who click ads may already be more likely to buy). C is a policy recommendation not supported by this data alone. D is extreme and unsupported."},
{type:"mcq",q:"PASSAGE: A fitness tracker collects\nheart rate, steps, sleep data, and GPS.\nA study using this data finds that\nusers who sleep 7+ hours walk 2,000\nmore steps per day on average.\n\nThe most important limitation of\nthis study is:",o:["A. Fitness trackers are inaccurate","B. Only people who own fitness trackers are studied, which may not represent the general population","C. 2,000 steps is not significant","D. Sleep data can't be collected digitally"],a:1,e:"Selection bias: fitness tracker owners are likely already more health-conscious than the average person. Results may not generalize to the broader population."},
{type:"mcq",q:"PASSAGE: A university analyzes 10 years\nof admissions data. They find that\nstudents from certain zip codes have\nhigher graduation rates.\n\nUsing zip code to predict which\napplicants will graduate is problematic\nbecause:",o:["A. Zip codes change over time","B. This could perpetuate socioeconomic bias, favoring wealthy areas and disadvantaging others","C. Graduation rates are not important","D. 10 years is too much data"],a:1,e:"Using zip code as a proxy for success embeds socioeconomic bias into admissions. Wealthier zip codes have better schools, resources, etc. This disadvantages applicants from less wealthy areas regardless of their individual potential."},

{cluster:"Mixed BI2 Challenges",desc:"Everything from Sessions 5-6 combined."},
{type:"mcq",q:"Convert binary 1010110 to decimal\nand determine if the result is\ndivisible by 7.",o:["A. 86, yes","B. 86, no","C. 96, no","D. 84, yes"],a:1,e:"1010110 = 64+16+4+2 = 86. 86 MOD 7 = 2. NOT divisible by 7."},
{type:"mcq",q:"A lossy-compressed photo is used in\na study about pixel-level image details.\nThis could be problematic because:",o:["A. Lossy files are too large","B. Lossy compression permanently removed fine details needed for the analysis","C. Lossy files can't be opened","D. Lossy compression adds extra pixels"],a:1,e:"Lossy compression removes data. If the study needs pixel-level detail, the removed data could lead to incorrect conclusions."},
{type:"mcq",q:"A dataset has 10,000 entries but was\ncollected only from one college.\nThe biggest limitation is:",o:["A. 10,000 is too few entries","B. The results may not generalize to other populations","C. College students can't be studied","D. The dataset has too many entries"],a:1,e:"10,000 is a good sample size, but only from one college. Results may not apply to other colleges, age groups, or demographics. This is a generalizability/sampling bias issue."},
{type:"mcq",q:"Which pair of concepts is CORRECTLY\nmatched?",o:["A. Metadata = the main content of a file","B. Lossy = perfectly reversible compression","C. Overflow = number exceeds storage capacity","D. Correlation = proof of causation"],a:2,e:"C is correct. A is wrong (metadata is about the file). B is wrong (lossy is irreversible). D is wrong (correlation ≠ causation)."},
{type:"mcq",q:"An 8-bit and 16-bit audio recording\nof the same sound. The 16-bit version:",o:["A. Is lower quality","B. Has more precise amplitude values per sample","C. Has fewer samples per second","D. Uses lossy compression"],a:1,e:"Bit depth = precision per sample. 16 bits = 65,536 levels vs 8 bits = 256 levels. More precise amplitude recording."},
{type:"mcq",q:"A researcher claims: \"Our data proves\nthat social media causes depression\nin teenagers.\" The study compared\nscreentime hours and depression scores.\nThe flaw is:",o:["A. Depression can't be measured","B. Observational data can show correlation but not prove causation","C. The sample was too large","D. Teenagers can't use social media"],a:1,e:"Observational studies (no controlled experiment) can only show correlation. Depressed teens might use social media MORE as coping (reverse causation). Other factors (loneliness, family issues) could drive both."},
{type:"mcq",q:"A bar chart compares average salaries\nacross 4 industries. The y-axis starts\nat $50,000 instead of $0. The effect is:",o:["A. No effect on interpretation","B. Small salary differences appear much larger than they actually are","C. The graph becomes more accurate","D. Salaries appear lower than reality"],a:1,e:"Truncated y-axis exaggerates differences. A $5,000 gap looks enormous when the visible range is only $50K-$80K instead of $0-$80K."},
{type:"mcq",q:"Which statement about large datasets\nis FALSE?",o:["A. They can reveal trends not visible in small samples","B. They require computational tools to process","C. They are always free of errors and bias","D. They may contain PII that raises privacy concerns"],a:2,e:"C is false. Large datasets can still contain errors, missing values, and biases from how the data was collected. Size doesn't equal quality."}
];

function build(){
    const el=document.getElementById('content');let qNum=0,html='';
    DATA.forEach(item=>{
        if(item.cluster){html+=`<div class="cluster"><div class="cluster-title">${item.cluster}</div><div class="cluster-desc">${item.desc}</div></div>`;return;}
        qNum++;const qid='q'+qNum;
        if(item.type==='open'){
            html+=`<div class="qcard"><div class="qhead"><span class="qnum">${qNum}</span><span class="qtype">OPEN</span></div><div class="qtext">${esc(item.q)}</div><textarea class="open-input mono" placeholder="Her answer..."></textarea><button class="reveal-btn" onclick="rv(this)">Show Answer</button><div class="ans-box"><div class="ans-text">${esc(item.a)}</div></div></div>`;
        } else {
            html+=`<div class="qcard" id="${qid}" data-rev="0" data-sel=""><div class="qhead"><span class="qnum">${qNum}</span><span class="qtype">MCQ</span></div><div class="qtext">${esc(item.q)}</div><div class="opts">`;
            item.o.forEach((opt,oi)=>{html+=`<button class="opt" data-i="${oi}" onclick="so(this,'${qid}')">${esc(opt)}</button>`;});
            html+=`</div><button class="chk" onclick="ck(this,'${qid}',${item.a})">Check Answer</button><div class="expl">${esc(item.e)}</div></div>`;
        }
    });el.innerHTML=html;
}
function rv(btn){const a=btn.nextElementSibling;const s=a.classList.contains('show');a.classList.toggle('show');btn.textContent=s?'Show Answer':'Hide';btn.classList.toggle('on',!s);}
function so(btn,qid){const c=document.getElementById(qid);if(c.dataset.rev==='1')return;c.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));btn.classList.add('sel');c.dataset.sel=btn.dataset.i;c.querySelector('.chk').classList.add('rdy');}
function ck(btn,qid,ans){const c=document.getElementById(qid);if(!c.dataset.sel||c.dataset.sel==='')return;if(c.dataset.rev==='1')return;c.dataset.rev='1';const s=parseInt(c.dataset.sel);c.querySelectorAll('.opt').forEach((o,i)=>{o.classList.add('locked');o.classList.remove('sel');if(i===ans)o.classList.add('right');else if(i===s&&i!==ans)o.classList.add('wrong');});c.querySelector('.expl').classList.add('show');if(s===ans)correct++;else wrong++;answered++;upd();btn.style.display='none';}
function upd(){document.getElementById('sc-c').textContent='Correct: '+correct;document.getElementById('sc-w').textContent='Wrong: '+wrong;document.getElementById('sc-t').textContent='Answered: '+answered+' / 50';}
window.addEventListener('scroll',()=>{const h=document.documentElement.scrollHeight-window.innerHeight;document.getElementById('prog').style.width=(window.scrollY/h*100)+'%';});
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
build();
</script>
</body>
